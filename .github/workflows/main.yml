name: vprofile actions
on: workflow_dispatch
env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: gitops-tut-proj
  EKS_CLUSTER: gitops-proj-tut-eks

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: Verify SonarQube token
        run: |
            response=$(curl -u ${{ secrets.SONAR_TOKEN }}: https://sonarcloud.io/api/authentication/validate)
            echo "SonarQube token validation response: $response"
            valid=$(echo $response | jq -r '.valid')
            if [ "$valid" != "true" ]; then
            echo "SonarQube token validation failed"
            exit 1
            fi
            echo "SonarQube token is valid"

      - name: Code checkout
        uses: actions/checkout@v4

      - name: Maven test
        run: mvn test

      - name: Checkstyle
        run: mvn checkstyle:checkstyle

      # Setup java 11 to be default (sonar-scanner requirement as of 5.x)
      - name: Set Java 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '11'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        # Force to fail step after specific time.
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }} #OPTIONAL